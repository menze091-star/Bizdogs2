<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BizDogs — UMD Live & Learning Community</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="site-header">
    <nav class="nav container">
      <a href="#home" class="nav-brand">
        <span class="brand-biz">BIZ</span><span class="brand-dogs">DOGS</span>
        <span class="brand-umd">@ UMD</span>
      </a>
      <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#events">Events</a></li>
        <li><a href="#join">Join Us</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <a href="#join" class="btn-primary nav-cta">Apply Now</a>
      <button class="nav-toggle" aria-label="Toggle menu">&#9776;</button>
    </nav>
  </header>

  <section class="hero" id="home">
    <div class="hero-bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>

    <div class="container hero-inner">
      <div class="hero-text">
        <span class="eyebrow">UMD Pre-Business • Lake Superior Hall</span>
        <h1 class="hero-title">Live. Learn.<br /><em>Lead.</em></h1>
        <p class="hero-sub">BizDogs is UMD's first-year pre-business LLC.</p>

        <div class="hero-actions">
          <a href="#join" class="btn-primary btn-lg">Join BizDogs →</a>
          <a href="#about" class="btn-ghost btn-lg">Learn More</a>
        </div>
      </div>

      <div class="hero-image-wrap">
        <div class="hero-img-frame">
          <img src="group-photo.png" alt="BizDogs 2025-26 cohort group photo" class="hero-img" />
          <div class="img-badge">Class of 2025–26</div>
        </div>
      </div>
    </div>
  </section>

  <section class="section" id="about">
    <div class="container">

      <div class="about-grid">

        <div class="about-card">
          <img src="networking-event.png" alt="Networking event" />
        </div>

        <div class="about-card">
          <img src="essentia-tour.png" alt="Essentia tour" />
        </div>

        <div class="about-card">
          <img src="chum-event.png" alt="CHUM event" />
        </div>

        <div class="about-card">
          <img src="team-building.png" alt="Team building" />
        </div>

        <div class="about-card about-card--wide">
          <img src="mba-collaboration.png" alt="MBA collaboration" />
        </div>

      </div>

    </div>
  </section>

  <section class="section section--dark" id="events">
    <div class="container">

      <div class="events-photos">
        <div class="events-photo-item">
          <img src="chum-volunteers.png" alt="CHUM volunteers" />
        </div>
        <div class="events-photo-item">
          <img src="networking-event.png" alt="Networking" />
        </div>
        <div class="events-photo-item">
          <img src="essentia-tour.png" alt="Site visit" />
        </div>
        <div class="events-photo-item">
          <img src="team-building.png" alt="Team building" />
        </div>
      </div>

    </div>
  </section>

  <section class="section section--gold" id="join">
    <div class="container">

      <div class="join-image">
        <img src="group-photo.png" alt="BizDogs group photo" />
      </div>

    </div>
  </section>

</body>
</html>
